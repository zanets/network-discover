name: Release

on:
  push:
    tags:
      - 'v*' # 當推送符合 v0.1.0 這種格式的 tag 時自動觸發

permissions:
  contents: write # 賦予建立與編輯 Release 及上傳二進位檔案的權限

jobs:
  build:
    name: Build - ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: network-discover
            name: nd-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: network-discover
            name: nd-macos

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Install System Dependencies (Linux Only)
      if: matrix.platform.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libpcap-dev

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.platform.target }}

    - name: Build Binary
      run: cargo build --release --target ${{ matrix.platform.target }}

    - name: Rename Binary
      run: |
        mv target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }} target/${{ matrix.platform.target }}/release/${{ matrix.platform.name }}

    - name: Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: target/${{ matrix.platform.target }}/release/${{ matrix.platform.name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
